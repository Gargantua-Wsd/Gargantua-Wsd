<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 240" role="img" aria-labelledby="title desc">
  <title id="title">Welcome to My World</title>
  <desc id="desc">Decorative profile title text. Change the fill color to adjust the title color.</desc>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#17495f" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="ink-highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="240" fill="none"/>
  <text
    x="700"
    y="145"
    text-anchor="middle"
    font-family="Matura MT Script Capitals, Brush Script MT, Segoe Script, Georgia, serif"
    font-size="118"
    font-style="italic"
    fill="#2f86a6"
    filter="url(#soft-shadow)"
  >Welcome to My World</text>
  <text
    x="700"
    y="145"
    text-anchor="middle"
    font-family="Matura MT Script Capitals, Brush Script MT, Segoe Script, Georgia, serif"
    font-size="118"
    font-style="italic"
    fill="url(#ink-highlight)"
  >Welcome to My World</text>
</svg>
